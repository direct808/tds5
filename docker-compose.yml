name: tds5
services:
  db:
    image: postgres:17.4-alpine
    environment:
      - POSTGRES_PASSWORD=1234
    ports:
      - 8432:5432

  redis:
    image: redis:8
    command:
      - redis-server
      - --maxmemory
      - ${REDIS_MAXMEMORY:-256m}
      - --maxmemory-policy
      - allkeys-lfu
      - --requirepass
      - ${REDIS_PASSWORD:-1234}

    ports:
      - 6389:6379

  backend:
    build:
      context: apps/backend

    image: tds5-backend
    env_file:
      - apps/backend/.env
    environment:
      - DATABASE_URL=postgres://postgres:1234@db:5432/postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - ${PORT:-3000}:${PORT:-3000}

  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    image: tds5-frontend
    env_file:
      - apps/frontend/.env
